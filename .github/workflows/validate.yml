name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  yaml-and-invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - name: Lint YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yaml

      - name: Validate greenhouse invariants
        working-directory: tools/validation
        run: uv run validate_greenhouse_config.py

  esphome:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/esphome/esphome:stable
    steps:
      - uses: actions/checkout@v4

      - name: Use example ESPHome secrets
        working-directory: esphome
        run: |
          cp secrets.yaml.example secrets.yaml

      - name: Validate ESPHome configs
        working-directory: esphome
        run: |
          esphome config greenhouse-watering.yaml
          esphome config greenhouse-climate.yaml

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
