esphome:
  name: greenhouse-climate
  friendly_name: "Теплица — климат и окна"
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  framework:
    type: arduino

substitutions:
  vent_move_timeout_ms: "8000"   # MG996R travel + mechanical slack
  vent_idle_mismatch_ms: "30000" # sustained limit vs commanded position

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid_iot
  password: !secret wifi_password_iot
  fast_connect: true
  power_save_mode: none
  manual_ip:
    static_ip: 192.168.30.12
    gateway: 192.168.30.1
    subnet: 255.255.255.0
  ap:
    ssid: "Greenhouse-Climate Fallback"
    password: !secret ap_fallback_password

captive_portal:

globals:
  - id: vent_1_move_started_at
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: vent_1_move_target
    type: int
    restore_value: no
    initial_value: "-1"
  - id: vent_1_move_fault
    type: bool
    restore_value: no
    initial_value: "false"
  - id: vent_1_idle_fault
    type: bool
    restore_value: no
    initial_value: "false"
  - id: vent_1_idle_mismatch_since
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: vent_2_move_started_at
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: vent_2_move_target
    type: int
    restore_value: no
    initial_value: "-1"
  - id: vent_2_move_fault
    type: bool
    restore_value: no
    initial_value: "false"
  - id: vent_2_idle_fault
    type: bool
    restore_value: no
    initial_value: "false"
  - id: vent_2_idle_mismatch_since
    type: uint32_t
    restore_value: no
    initial_value: "0"

i2c:
  - id: bus_main
    sda: GPIO21
    scl: GPIO22
    scan: true
  - id: bus_secondary
    sda: GPIO18
    scl: GPIO19
    scan: true

sensor:
  - platform: wifi_signal
    name: "Климат — RSSI"
    id: wifi_rssi
    update_interval: 60s

  # SHT31 ×3 — triangulation: entrance low, opposite side, center top (see docs/03 §1.4.1)
  - platform: sht3xd
    i2c_id: bus_main
    address: 0x44
    update_interval: 30s
    temperature:
      name: "Теплица центр наверху — температура"
      id: temp_center_top
    humidity:
      name: "Теплица центр наверху — влажность"
      id: hum_center_top

  - platform: sht3xd
    i2c_id: bus_main
    address: 0x45
    update_interval: 30s
    temperature:
      name: "Теплица вход низ — температура"
      id: temp_entrance_low
    humidity:
      name: "Теплица вход низ — влажность"
      id: hum_entrance_low

  - platform: sht3xd
    i2c_id: bus_secondary
    address: 0x44
    update_interval: 30s
    temperature:
      name: "Теплица противоположная сторона — температура"
      id: temp_opposite
    humidity:
      name: "Теплица противоположная сторона — влажность"
      id: hum_opposite

  - platform: bh1750
    i2c_id: bus_main
    address: 0x23
    name: "Освещённость потолок"
    id: lux_ceiling
    update_interval: 60s

  - platform: bh1750
    i2c_id: bus_secondary
    address: 0x5C
    name: "Освещённость растения"
    id: lux_plants
    update_interval: 60s

  - platform: template
    name: "Теплица — средняя температура"
    id: temp_avg
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    lambda: |-
      if (isnan(id(temp_entrance_low).state) || isnan(id(temp_opposite).state) ||
          isnan(id(temp_center_top).state))
        return {};
      return (id(temp_entrance_low).state + id(temp_opposite).state +
              id(temp_center_top).state) / 3.0;
    update_interval: 30s

  - platform: template
    name: "Теплица — средняя влажность"
    id: hum_avg
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    accuracy_decimals: 0
    lambda: |-
      if (isnan(id(hum_entrance_low).state) || isnan(id(hum_opposite).state) ||
          isnan(id(hum_center_top).state))
        return {};
      return (id(hum_entrance_low).state + id(hum_opposite).state +
              id(hum_center_top).state) / 3.0;
    update_interval: 30s

  - platform: template
    name: "Теплица — max температура"
    id: temp_max
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    lambda: |-
      if (isnan(id(temp_entrance_low).state) || isnan(id(temp_opposite).state) ||
          isnan(id(temp_center_top).state))
        return {};
      return std::max({id(temp_entrance_low).state, id(temp_opposite).state,
                       id(temp_center_top).state});
    update_interval: 30s

  - platform: template
    name: "Теплица — min температура"
    id: temp_min
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    lambda: |-
      if (isnan(id(temp_entrance_low).state) || isnan(id(temp_opposite).state) ||
          isnan(id(temp_center_top).state))
        return {};
      return std::min({id(temp_entrance_low).state, id(temp_opposite).state,
                       id(temp_center_top).state});
    update_interval: 30s

  - platform: template
    name: "Теплица — разброс температуры"
    id: temp_delta
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    lambda: |-
      if (isnan(id(temp_entrance_low).state) || isnan(id(temp_opposite).state) ||
          isnan(id(temp_center_top).state))
        return {};
      const float t_max = std::max({id(temp_entrance_low).state, id(temp_opposite).state,
                                  id(temp_center_top).state});
      const float t_min = std::min({id(temp_entrance_low).state, id(temp_opposite).state,
                                  id(temp_center_top).state});
      return t_max - t_min;
    update_interval: 30s

  - platform: template
    name: "Теплица — max влажность"
    id: hum_max
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    accuracy_decimals: 0
    lambda: |-
      if (isnan(id(hum_entrance_low).state) || isnan(id(hum_opposite).state) ||
          isnan(id(hum_center_top).state))
        return {};
      return std::max({id(hum_entrance_low).state, id(hum_opposite).state,
                       id(hum_center_top).state});
    update_interval: 30s

  - platform: template
    name: "Теплица — min влажность"
    id: hum_min
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    accuracy_decimals: 0
    lambda: |-
      if (isnan(id(hum_entrance_low).state) || isnan(id(hum_opposite).state) ||
          isnan(id(hum_center_top).state))
        return {};
      return std::min({id(hum_entrance_low).state, id(hum_opposite).state,
                       id(hum_center_top).state});
    update_interval: 30s

  - platform: template
    name: "Теплица — разброс влажности"
    id: hum_delta
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    accuracy_decimals: 0
    lambda: |-
      if (isnan(id(hum_entrance_low).state) || isnan(id(hum_opposite).state) ||
          isnan(id(hum_center_top).state))
        return {};
      const float h_max = std::max({id(hum_entrance_low).state, id(hum_opposite).state,
                                    id(hum_center_top).state});
      const float h_min = std::min({id(hum_entrance_low).state, id(hum_opposite).state,
                                    id(hum_center_top).state});
      return h_max - h_min;
    update_interval: 30s

text_sensor:
  - platform: template
    name: "Теплица — зона max температуры"
    id: temp_hot_spot
    icon: "mdi:thermometer-high"
    lambda: |-
      if (isnan(id(temp_entrance_low).state) || isnan(id(temp_opposite).state) ||
          isnan(id(temp_center_top).state))
        return {};
      const float t_ent = id(temp_entrance_low).state;
      const float t_opp = id(temp_opposite).state;
      const float t_top = id(temp_center_top).state;
      const float t_max = std::max({t_ent, t_opp, t_top});
      if (t_top >= t_max - 0.05f)
        return {"Центр наверху"};
      if (t_ent >= t_opp)
        return {"Вход низ"};
      return {"Противоположная сторона"};
    update_interval: 30s

  - platform: template
    name: "Теплица — зона min температуры"
    id: temp_cold_spot
    icon: "mdi:thermometer-low"
    lambda: |-
      if (isnan(id(temp_entrance_low).state) || isnan(id(temp_opposite).state) ||
          isnan(id(temp_center_top).state))
        return {};
      const float t_ent = id(temp_entrance_low).state;
      const float t_opp = id(temp_opposite).state;
      const float t_top = id(temp_center_top).state;
      const float t_min = std::min({t_ent, t_opp, t_top});
      if (t_top <= t_min + 0.05f)
        return {"Центр наверху"};
      if (t_ent <= t_opp)
        return {"Вход низ"};
      return {"Противоположная сторона"};
    update_interval: 30s

binary_sensor:
  # NC microswitches: contact to GND when window reaches end position
  - platform: gpio
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
      inverted: true
    name: "Форточка 1 — закрыта (концевик)"
    id: limit_w1_closed

  - platform: gpio
    pin:
      number: GPIO5
      mode: INPUT_PULLUP
      inverted: true
    name: "Форточка 1 — открыта (концевик)"
    id: limit_w1_open

  - platform: gpio
    pin:
      number: GPIO23
      mode: INPUT_PULLUP
      inverted: true
    name: "Форточка 2 — закрыта (концевик)"
    id: limit_w2_closed

  - platform: gpio
    pin:
      number: GPIO25
      mode: INPUT_PULLUP
      inverted: true
    name: "Форточка 2 — открыта (концевик)"
    id: limit_w2_open

  - platform: template
    name: "Форточка 1 — ошибка положения"
    id: vent_1_position_fault
    device_class: problem
    lambda: |-
      return id(vent_1_move_fault) || id(vent_1_idle_fault);

  - platform: template
    name: "Форточка 2 — ошибка положения"
    id: vent_2_position_fault
    device_class: problem
    lambda: |-
      return id(vent_2_move_fault) || id(vent_2_idle_fault);

pca9685:
  - id: pca9685_hub
    address: 0x40
    frequency: 50 Hz

output:
  - platform: pca9685
    id: pwm_window_1
    pca9685_id: pca9685_hub
    channel: 0
    min_power: 4.5%
    max_power: 10.5%

  - platform: pca9685
    id: pwm_window_2
    pca9685_id: pca9685_hub
    channel: 1
    min_power: 4.5%
    max_power: 10.5%

number:
  - platform: template
    name: "Окно 1 — угол"
    id: window_1_angle
    min_value: 0
    max_value: 90
    step: 1
    unit_of_measurement: "°"
    optimistic: true
    set_action:
      - servo.write:
          id: servo_window_1
          level: !lambda 'return x / 90.0;'

  - platform: template
    name: "Окно 2 — угол"
    id: window_2_angle
    min_value: 0
    max_value: 90
    step: 1
    unit_of_measurement: "°"
    optimistic: true
    set_action:
      - servo.write:
          id: servo_window_2
          level: !lambda 'return x / 90.0;'

servo:
  - id: servo_window_1
    output: pwm_window_1
    auto_detach: false

  - id: servo_window_2
    output: pwm_window_2
    auto_detach: false

cover:
  - platform: template
    name: "Форточка 1"
    id: vent_window_1
    has_position: true
    optimistic: true
    open_action:
      - lambda: |-
          id(vent_1_move_started_at) = millis();
          id(vent_1_move_target) = 1;
          id(vent_1_move_fault) = false;
      - number.set:
          id: window_1_angle
          value: 90
    close_action:
      - lambda: |-
          id(vent_1_move_started_at) = millis();
          id(vent_1_move_target) = 0;
          id(vent_1_move_fault) = false;
      - number.set:
          id: window_1_angle
          value: 0
    set_position_action:
      - lambda: |-
          const float angle = x * 90.0f;
          if (angle <= 5.0f) {
            id(vent_1_move_started_at) = millis();
            id(vent_1_move_target) = 0;
            id(vent_1_move_fault) = false;
          } else if (angle >= 85.0f) {
            id(vent_1_move_started_at) = millis();
            id(vent_1_move_target) = 1;
            id(vent_1_move_fault) = false;
          } else {
            id(vent_1_move_started_at) = 0;
            id(vent_1_move_target) = -1;
            id(vent_1_move_fault) = false;
          }
      - number.set:
          id: window_1_angle
          value: !lambda 'return x * 90;'

  - platform: template
    name: "Форточка 2"
    id: vent_window_2
    has_position: true
    optimistic: true
    open_action:
      - lambda: |-
          id(vent_2_move_started_at) = millis();
          id(vent_2_move_target) = 1;
          id(vent_2_move_fault) = false;
      - number.set:
          id: window_2_angle
          value: 90
    close_action:
      - lambda: |-
          id(vent_2_move_started_at) = millis();
          id(vent_2_move_target) = 0;
          id(vent_2_move_fault) = false;
      - number.set:
          id: window_2_angle
          value: 0
    set_position_action:
      - lambda: |-
          const float angle = x * 90.0f;
          if (angle <= 5.0f) {
            id(vent_2_move_started_at) = millis();
            id(vent_2_move_target) = 0;
            id(vent_2_move_fault) = false;
          } else if (angle >= 85.0f) {
            id(vent_2_move_started_at) = millis();
            id(vent_2_move_target) = 1;
            id(vent_2_move_fault) = false;
          } else {
            id(vent_2_move_started_at) = 0;
            id(vent_2_move_target) = -1;
            id(vent_2_move_fault) = false;
          }
      - number.set:
          id: window_2_angle
          value: !lambda 'return x * 90;'

interval:
  - interval: 1s
    then:
      - lambda: |-
          const uint32_t move_timeout_ms = atoi("${vent_move_timeout_ms}");
          const uint32_t idle_mismatch_ms = atoi("${vent_idle_mismatch_ms}");
          const uint32_t now = millis();

          // Window 1 — post-move limit check
          if (id(vent_1_move_started_at) != 0 &&
              (now - id(vent_1_move_started_at)) >= move_timeout_ms) {
            const int target = id(vent_1_move_target);
            bool ok = true;
            if (target == 0) {
              ok = id(limit_w1_closed).state;
            } else if (target == 1) {
              ok = id(limit_w1_open).state;
            }
            if (target == 0 || target == 1) {
              id(vent_1_move_fault) = !ok;
            }
            id(vent_1_move_started_at) = 0;
            id(vent_1_move_target) = -1;
          }

          // Window 2 — post-move limit check
          if (id(vent_2_move_started_at) != 0 &&
              (now - id(vent_2_move_started_at)) >= move_timeout_ms) {
            const int target = id(vent_2_move_target);
            bool ok = true;
            if (target == 0) {
              ok = id(limit_w2_closed).state;
            } else if (target == 1) {
              ok = id(limit_w2_open).state;
            }
            if (target == 0 || target == 1) {
              id(vent_2_move_fault) = !ok;
            }
            id(vent_2_move_started_at) = 0;
            id(vent_2_move_target) = -1;
          }

          // Window 1 — idle position vs limit switches
          if (id(vent_1_move_started_at) == 0) {
            const float angle = id(window_1_angle).state;
            bool mismatch = false;
            if (angle <= 5.0f) {
              mismatch = !id(limit_w1_closed).state || id(limit_w1_open).state;
            } else if (angle >= 85.0f) {
              mismatch = !id(limit_w1_open).state || id(limit_w1_closed).state;
            } else {
              id(vent_1_idle_mismatch_since) = 0;
              id(vent_1_idle_fault) = false;
              mismatch = false;
            }
            if (mismatch) {
              if (id(vent_1_idle_mismatch_since) == 0) {
                id(vent_1_idle_mismatch_since) = now;
              } else if ((now - id(vent_1_idle_mismatch_since)) >= idle_mismatch_ms) {
                id(vent_1_idle_fault) = true;
              }
            } else if (angle <= 5.0f || angle >= 85.0f) {
              id(vent_1_idle_mismatch_since) = 0;
              id(vent_1_idle_fault) = false;
            }
          }

          // Window 2 — idle position vs limit switches
          if (id(vent_2_move_started_at) == 0) {
            const float angle = id(window_2_angle).state;
            bool mismatch = false;
            if (angle <= 5.0f) {
              mismatch = !id(limit_w2_closed).state || id(limit_w2_open).state;
            } else if (angle >= 85.0f) {
              mismatch = !id(limit_w2_open).state || id(limit_w2_closed).state;
            } else {
              id(vent_2_idle_mismatch_since) = 0;
              id(vent_2_idle_fault) = false;
              mismatch = false;
            }
            if (mismatch) {
              if (id(vent_2_idle_mismatch_since) == 0) {
                id(vent_2_idle_mismatch_since) = now;
              } else if ((now - id(vent_2_idle_mismatch_since)) >= idle_mismatch_ms) {
                id(vent_2_idle_fault) = true;
              }
            } else if (angle <= 5.0f || angle >= 85.0f) {
              id(vent_2_idle_mismatch_since) = 0;
              id(vent_2_idle_fault) = false;
            }
          }

  - interval: 5min
    then:
      - if:
          condition:
            lambda: 'return id(wifi_rssi).state < -85;'
          then:
            - wifi.disable:
            - delay: 5s
            - wifi.enable:
