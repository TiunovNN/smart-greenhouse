esphome:
  name: greenhouse-watering
  friendly_name: "Теплица — полив и бак"
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  framework:
    type: arduino

substitutions:
  flow_multiplier: "0.00222"  # YF-S201 ~450 pulses/L — calibrate on bench
  # Sealed capacitive soil probes (VH400 class): bench-calibrate mV → % after install
  soil_cal_dry_v: "0.55"
  soil_cal_wet_v: "2.45"
  no_flow_timeout_ms: "15000"
  no_flow_threshold_lmin: "0.05"
  post_close_settle_ms: "8000"   # delay after valve close before checking flow
  post_close_check_ms: "5000"    # sustained flow after recent close → fault
  idle_flow_check_ms: "12000"    # sustained flow when valve idle (boot / long idle) → fault

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid_iot
  password: !secret wifi_password_iot
  fast_connect: true
  power_save_mode: none
  manual_ip:
    static_ip: 192.168.30.11
    gateway: 192.168.30.1
    subnet: 255.255.255.0
  # После первого подключения раскомментируйте BSSID ближайшей Mesh-точки:
  # bssid: "XX:XX:XX:XX:XX:XX"
  ap:
    ssid: "Greenhouse-Water Fallback"
    password: !secret ap_fallback_password

captive_portal:

i2c:
  - id: bus_soil
    sda: GPIO21
    scl: GPIO22
    scan: true

ads1115:
  - address: 0x48
    id: ads_soil_a
  - address: 0x49
    id: ads_soil_b

globals:
  - id: fill_cycle_start_pulses
    type: float
    restore_value: no
    initial_value: "0"
  - id: fill_middle_level_pulses
    type: float
    restore_value: no
    initial_value: "0"
  - id: fill_calibration_window_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: fill_last_calibration_pulses
    type: float
    restore_value: no
    initial_value: "0"
  - id: irrigation_cycle_start_total
    type: float
    restore_value: no
    initial_value: "0"
  - id: fill_valve_opened_at
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: irrigation_valve_opened_at
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: fill_flow_seen
    type: bool
    restore_value: no
    initial_value: "false"
  - id: irrigation_flow_seen
    type: bool
    restore_value: no
    initial_value: "false"
  - id: fill_no_flow_fault
    type: bool
    restore_value: no
    initial_value: "false"
  - id: irrigation_no_flow_fault
    type: bool
    restore_value: no
    initial_value: "false"
  - id: fill_post_close_fault
    type: bool
    restore_value: no
    initial_value: "false"
  - id: irrigation_post_close_fault
    type: bool
    restore_value: no
    initial_value: "false"
  - id: fill_valve_closed_at
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: irrigation_valve_closed_at
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: fill_post_close_high_since
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: irrigation_post_close_high_since
    type: uint32_t
    restore_value: no
    initial_value: "0"

sensor:
  - platform: wifi_signal
    name: "Полив — RSSI"
    id: wifi_rssi
    update_interval: 60s

  - platform: dallas_temp
    one_wire_id: bus_onewire
    name: "Бак — температура воды"
    id: tank_water_temp
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 5

  - platform: dallas_temp
    one_wire_id: bus_onewire
    address: 0x000000000000  # заменить на реальный ROM после первого скана
    name: "Полив — температура воды"
    id: irrigation_water_temp

  - platform: pulse_counter
    pin:
      number: GPIO13
      mode: INPUT_PULLUP
    name: "Полив — расход"
    id: flow_irrigation
    unit_of_measurement: "L/min"
    accuracy_decimals: 2
    filters:
      - multiply: ${flow_multiplier}
    total:
      id: irrigation_total_liters
      internal: true
      filters:
        - multiply: ${flow_multiplier}
    update_interval: 1s

  - platform: pulse_counter
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
    name: "Бак — расход наполнения"
    id: flow_tank_fill
    unit_of_measurement: "L/min"
    accuracy_decimals: 2
    filters:
      - lambda: |-
          const float multiplier = isnan(id(fill_flow_multiplier).state)
              ? atof("${flow_multiplier}")
              : id(fill_flow_multiplier).state;
          return x * multiplier;
    total:
      id: fill_total_pulses
      internal: true
    update_interval: 1s

  - platform: template
    name: "Полив — объём за цикл"
    id: irrigation_cycle_volume
    unit_of_measurement: "L"
    accuracy_decimals: 2
    device_class: volume
    state_class: measurement
    lambda: |-
      if (!id(irrigation_total_liters).has_state()) {
        return 0.0f;
      }
      return id(irrigation_total_liters).state - id(irrigation_cycle_start_total);
    update_interval: 1s

  - platform: template
    name: "Бак — объём наполнения за цикл"
    id: fill_cycle_volume
    unit_of_measurement: "L"
    accuracy_decimals: 2
    device_class: volume
    state_class: measurement
    lambda: |-
      if (!id(fill_total_pulses).has_state()) {
        return 0.0f;
      }
      const float multiplier = isnan(id(fill_flow_multiplier).state)
          ? atof("${flow_multiplier}")
          : id(fill_flow_multiplier).state;
      return (id(fill_total_pulses).state - id(fill_cycle_start_pulses)) * multiplier;
    update_interval: 1s

  - platform: template
    name: "Бак — импульсы последней калибровки"
    id: fill_last_calibration_pulse_count
    accuracy_decimals: 0
    state_class: measurement
    lambda: |-
      return id(fill_last_calibration_pulses);
    update_interval: 30s

  # Sealed capacitive soil probes ×6 via 2× ADS1115 (0x48 / 0x49).
  # Raw ADC → template % via per-probe number entities (HA calibration script writes dry/wet V).
  - platform: ads1115
    ads1115_id: ads_soil_a
    multiplexer: A0_GND
    gain: 6.144
    id: soil_l_near_adc
    internal: true
    update_interval: 60s

  - platform: template
    name: "Почва L у входа — напряжение"
    id: soil_l_near_voltage
    object_id: pochva_l_u_vkhoda_napryazhenie
    unit_of_measurement: "V"
    accuracy_decimals: 3
    state_class: measurement
    lambda: |-
      if (!id(soil_l_near_adc).has_state()) {
        return NAN;
      }
      return id(soil_l_near_adc).state;
    update_interval: 60s

  - platform: template
    name: "Почва L у входа — влажность"
    id: soil_l_near
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: moisture
    state_class: measurement
    lambda: |-
      if (!id(soil_l_near_adc).has_state()) {
        return NAN;
      }
      const float v = id(soil_l_near_adc).state;
      const float dry = id(soil_l_near_cal_dry).state;
      const float wet = id(soil_l_near_cal_wet).state;
      if (isnan(dry) || isnan(wet) || wet <= dry + 0.01f) {
        return NAN;
      }
      float pct = (v - dry) / (wet - dry) * 100.0f;
      if (pct < 0.0f) pct = 0.0f;
      if (pct > 100.0f) pct = 100.0f;
      return pct;
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 5
    update_interval: 60s

  - platform: ads1115
    ads1115_id: ads_soil_a
    multiplexer: A1_GND
    gain: 6.144
    id: soil_l_mid_adc
