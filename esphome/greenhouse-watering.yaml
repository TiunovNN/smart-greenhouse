esphome:
  name: greenhouse-watering
  friendly_name: "Теплица — полив и бак"
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  framework:
    type: arduino

substitutions:
  flow_multiplier: "0.00222"  # YF-S201 ~450 pulses/L — calibrate on bench
  no_flow_timeout_ms: "15000"
  no_flow_threshold_lmin: "0.05"
  post_close_settle_ms: "8000"   # delay after valve close before checking flow
  post_close_check_ms: "5000"    # sustained flow after recent close → fault
  idle_flow_check_ms: "12000"    # sustained flow when valve idle (boot / long idle) → fault

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid_iot
  password: !secret wifi_password_iot
  fast_connect: true
  power_save_mode: none
  manual_ip:
    static_ip: 192.168.30.11
    gateway: 192.168.30.1
    subnet: 255.255.255.0
  # После первого подключения раскомментируйте BSSID ближайшей Mesh-точки:
  # bssid: "XX:XX:XX:XX:XX:XX"
  ap:
    ssid: "Greenhouse-Water Fallback"
    password: !secret ap_fallback_password

captive_portal:

globals:
  - id: fill_cycle_start_pulses
    type: float
    restore_value: no
    initial_value: "0"
  - id: fill_middle_level_pulses
    type: float
    restore_value: no
    initial_value: "0"
  - id: fill_calibration_window_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: fill_last_calibration_pulses
    type: float
    restore_value: no
    initial_value: "0"
  - id: irrigation_cycle_start_total
    type: float
    restore_value: no
    initial_value: "0"
  - id: fill_valve_opened_at
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: irrigation_valve_opened_at
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: fill_flow_seen
    type: bool
    restore_value: no
    initial_value: "false"
  - id: irrigation_flow_seen
    type: bool
    restore_value: no
    initial_value: "false"
  - id: fill_no_flow_fault
    type: bool
    restore_value: no
    initial_value: "false"
  - id: irrigation_no_flow_fault
    type: bool
    restore_value: no
    initial_value: "false"
  - id: fill_post_close_fault
    type: bool
    restore_value: no
    initial_value: "false"
  - id: irrigation_post_close_fault
    type: bool
    restore_value: no
    initial_value: "false"
  - id: fill_valve_closed_at
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: irrigation_valve_closed_at
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: fill_post_close_high_since
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: irrigation_post_close_high_since
    type: uint32_t
    restore_value: no
    initial_value: "0"

sensor:
  - platform: wifi_signal
    name: "Полив — RSSI"
    id: wifi_rssi
    update_interval: 60s

  - platform: dallas_temp
    one_wire_id: bus_onewire
    name: "Бак — температура воды"
    id: tank_water_temp
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 5

  - platform: dallas_temp
    one_wire_id: bus_onewire
    address: 0x000000000000  # заменить на реальный ROM после первого скана
    name: "Полив — температура воды"
    id: irrigation_water_temp

  - platform: pulse_counter
    pin:
      number: GPIO13
      mode: INPUT_PULLUP
    name: "Полив — расход"
    id: flow_irrigation
    unit_of_measurement: "L/min"
    accuracy_decimals: 2
    filters:
      - multiply: ${flow_multiplier}
    total:
      id: irrigation_total_liters
      internal: true
      filters:
        - multiply: ${flow_multiplier}
    update_interval: 1s

  - platform: pulse_counter
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
    name: "Бак — расход наполнения"
    id: flow_tank_fill
    unit_of_measurement: "L/min"
    accuracy_decimals: 2
    filters:
      - lambda: |-
          const float multiplier = isnan(id(fill_flow_multiplier).state)
              ? atof("${flow_multiplier}")
              : id(fill_flow_multiplier).state;
          return x * multiplier;
    total:
      id: fill_total_pulses
      internal: true
    update_interval: 1s

  - platform: template
    name: "Полив — объём за цикл"
    id: irrigation_cycle_volume
    unit_of_measurement: "L"
    accuracy_decimals: 2
    device_class: volume
    state_class: measurement
    lambda: |-
      if (!id(irrigation_total_liters).has_state()) {
        return 0.0f;
      }
      return id(irrigation_total_liters).state - id(irrigation_cycle_start_total);
    update_interval: 1s

  - platform: template
    name: "Бак — объём наполнения за цикл"
    id: fill_cycle_volume
    unit_of_measurement: "L"
    accuracy_decimals: 2
    device_class: volume
    state_class: measurement
    lambda: |-
      if (!id(fill_total_pulses).has_state()) {
        return 0.0f;
      }
      const float multiplier = isnan(id(fill_flow_multiplier).state)
          ? atof("${flow_multiplier}")
          : id(fill_flow_multiplier).state;
      return (id(fill_total_pulses).state - id(fill_cycle_start_pulses)) * multiplier;
    update_interval: 1s

  - platform: template
    name: "Бак — импульсы последней калибровки"
    id: fill_last_calibration_pulse_count
    accuracy_decimals: 0
    state_class: measurement
    lambda: |-
      return id(fill_last_calibration_pulses);
    update_interval: 30s

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO16
      mode: INPUT_PULLUP
      inverted: true
    name: "Бак — верхний уровень"
    id: tank_level_upper
    device_class: moisture
    filters:
      - delayed_on: 2s
      - delayed_off: 5s
    on_press:
      - lambda: |-
          if (!id(fill_calibration_window_active) || !id(fill_total_pulses).has_state()) {
            return;
          }
          const float pulses = id(fill_total_pulses).state - id(fill_middle_level_pulses);
          const float known_volume = id(fill_level_gap_volume).state;
          if (pulses < 10.0f || known_volume <= 0.0f) {
            id(fill_calibration_window_active) = false;
            return;
          }
          const float calibrated_multiplier = known_volume / pulses;
          if (calibrated_multiplier < 0.0005f || calibrated_multiplier > 0.01f) {
            id(fill_calibration_window_active) = false;
            return;
          }
          auto call = id(fill_flow_multiplier).make_call();
          call.set_value(calibrated_multiplier);
          call.perform();
          id(fill_last_calibration_pulses) = pulses;
          id(fill_calibration_window_active) = false;
      - switch.turn_off: valve_tank_fill

  - platform: gpio
    pin:
      number: GPIO17
      mode: INPUT_PULLUP
      inverted: true
    name: "Бак — средний уровень"
    id: tank_level_middle
    device_class: moisture
    filters:
      - delayed_on: 2s
      - delayed_off: 5s
    on_press:
      - lambda: |-
          if (id(valve_tank_fill).state && id(fill_total_pulses).has_state()) {
            id(fill_middle_level_pulses) = id(fill_total_pulses).state;
            id(fill_calibration_window_active) = true;
          }

  - platform: template
    name: "Полив — нет потока"
    id: irrigation_no_flow
    device_class: problem
    lambda: |-
      return id(irrigation_no_flow_fault);

  - platform: template
    name: "Бак — нет потока наполнения"
    id: fill_no_flow
    device_class: problem
    lambda: |-
      return id(fill_no_flow_fault);

  - platform: template
    name: "Полив — поток при закрытом клапане"
    id: irrigation_post_close_flow
    device_class: problem
    lambda: |-
      return id(irrigation_post_close_fault);

  - platform: template
    name: "Бак — поток при закрытом клапане"
    id: fill_post_close_flow
    device_class: problem
    lambda: |-
      return id(fill_post_close_fault);

  - platform: template
    name: "Полив — цель достигнута"
    id: irrigation_target_reached
    lambda: |-
      if (!id(valve_irrigation).state) {
        return false;
      }
      return id(irrigation_cycle_volume).state >= id(irrigation_target_volume).state;

number:
  - platform: template
    name: "Полив — целевой объём"
    id: irrigation_target_volume
    optimistic: true
    restore_value: true
    initial_value: 5
    min_value: 0.1
    max_value: 100
    step: 0.5
    unit_of_measurement: "L"
    mode: box

  - platform: template
    name: "Бак — объём между уровнями"
    id: fill_level_gap_volume
    optimistic: true
    restore_value: true
    initial_value: 10
    min_value: 0.5
    max_value: 200
    step: 0.1
    unit_of_measurement: "L"
    mode: box

  - platform: template
    name: "Бак — коэффициент расходомера наполнения"
    id: fill_flow_multiplier
    optimistic: true
    restore_value: true
    initial_value: ${flow_multiplier}
    min_value: 0.0005
    max_value: 0.01
    step: 0.00001
    mode: box

switch:
  - platform: gpio
    pin: GPIO26
    name: "Клапан полива"
    id: valve_irrigation
    restore_mode: ALWAYS_OFF
    icon: "mdi:sprinkler"
    on_turn_on:
      - lambda: |-
          if (id(irrigation_total_liters).has_state()) {
            id(irrigation_cycle_start_total) = id(irrigation_total_liters).state;
          } else {
            id(irrigation_cycle_start_total) = 0.0f;
          }
          id(irrigation_valve_opened_at) = millis();
          id(irrigation_flow_seen) = false;
          id(irrigation_no_flow_fault) = false;
          id(irrigation_post_close_fault) = false;
          id(irrigation_post_close_high_since) = 0;
    on_turn_off:
      - lambda: |-
          id(irrigation_no_flow_fault) = false;
          id(irrigation_valve_closed_at) = millis();
          id(irrigation_post_close_high_since) = 0;

  - platform: gpio
    pin: GPIO27
    name: "Клапан наполнения бака"
    id: valve_tank_fill
    restore_mode: ALWAYS_OFF
    icon: "mdi:water-pump"
    on_turn_on:
      - lambda: |-
          if (id(fill_total_pulses).has_state()) {
            id(fill_cycle_start_pulses) = id(fill_total_pulses).state;
          } else {
            id(fill_cycle_start_pulses) = 0.0f;
          }
          id(fill_calibration_window_active) = false;
          id(fill_valve_opened_at) = millis();
          id(fill_flow_seen) = false;
          id(fill_no_flow_fault) = false;
          id(fill_post_close_fault) = false;
          id(fill_post_close_high_since) = 0;
    on_turn_off:
      - lambda: |-
          id(fill_no_flow_fault) = false;
          id(fill_valve_closed_at) = millis();
          id(fill_post_close_high_since) = 0;

one_wire:
  - platform: gpio
    pin: GPIO4
    id: bus_onewire

interval:
  - interval: 1s
    then:
      - if:
          condition:
            switch.is_on: valve_irrigation
          then:
            - lambda: |-
                const float threshold = atof("${no_flow_threshold_lmin}");
                const uint32_t timeout_ms = atoi("${no_flow_timeout_ms}");
                if (id(flow_irrigation).has_state() && id(flow_irrigation).state >= threshold) {
                  id(irrigation_flow_seen) = true;
                } else if (!id(irrigation_flow_seen) &&
                           (millis() - id(irrigation_valve_opened_at)) >= timeout_ms) {
                  id(irrigation_no_flow_fault) = true;
                }
      - if:
          condition:
            switch.is_on: valve_tank_fill
          then:
            - lambda: |-
                const float threshold = atof("${no_flow_threshold_lmin}");
                const uint32_t timeout_ms = atoi("${no_flow_timeout_ms}");
                if (id(flow_tank_fill).has_state() && id(flow_tank_fill).state >= threshold) {
                  id(fill_flow_seen) = true;
                } else if (!id(fill_flow_seen) &&
                           (millis() - id(fill_valve_opened_at)) >= timeout_ms) {
                  id(fill_no_flow_fault) = true;
                }
      - if:
          condition:
            switch.is_off: valve_irrigation
          then:
            - lambda: |-
                // Unexpected flow while valve closed: post-close (fast) + idle monitoring (long)
                const float threshold = atof("${no_flow_threshold_lmin}");
                const uint32_t settle_ms = atoi("${post_close_settle_ms}");
                const uint32_t post_close_check_ms = atoi("${post_close_check_ms}");
                const uint32_t idle_check_ms = atoi("${idle_flow_check_ms}");
                const uint32_t now = millis();
                const uint32_t closed_at = id(irrigation_valve_closed_at);
                if (closed_at != 0 && (now - closed_at) < settle_ms) {
                  id(irrigation_post_close_high_since) = 0;
                  return;
                }
                if (id(flow_irrigation).has_state() && id(flow_irrigation).state >= threshold) {
                  if (id(irrigation_post_close_high_since) == 0) {
                    id(irrigation_post_close_high_since) = now;
                  }
                  const uint32_t required_ms =
                      (closed_at != 0 && (now - closed_at) < (settle_ms + 120000))
                          ? post_close_check_ms
                          : idle_check_ms;
                  if ((now - id(irrigation_post_close_high_since)) >= required_ms) {
                    id(irrigation_post_close_fault) = true;
                  }
                } else {
                  id(irrigation_post_close_high_since) = 0;
                  id(irrigation_post_close_fault) = false;
                }
      - if:
          condition:
            switch.is_off: valve_tank_fill
          then:
            - lambda: |-
                const float threshold = atof("${no_flow_threshold_lmin}");
                const uint32_t settle_ms = atoi("${post_close_settle_ms}");
                const uint32_t post_close_check_ms = atoi("${post_close_check_ms}");
                const uint32_t idle_check_ms = atoi("${idle_flow_check_ms}");
                const uint32_t now = millis();
                const uint32_t closed_at = id(fill_valve_closed_at);
                if (closed_at != 0 && (now - closed_at) < settle_ms) {
                  id(fill_post_close_high_since) = 0;
                  return;
                }
                if (id(flow_tank_fill).has_state() && id(flow_tank_fill).state >= threshold) {
                  if (id(fill_post_close_high_since) == 0) {
                    id(fill_post_close_high_since) = now;
                  }
                  const uint32_t required_ms =
                      (closed_at != 0 && (now - closed_at) < (settle_ms + 120000))
                          ? post_close_check_ms
                          : idle_check_ms;
                  if ((now - id(fill_post_close_high_since)) >= required_ms) {
                    id(fill_post_close_fault) = true;
                  }
                } else {
                  id(fill_post_close_high_since) = 0;
                  id(fill_post_close_fault) = false;
                }

  - interval: 5min
    then:
      - if:
          condition:
            lambda: 'return id(wifi_rssi).state < -85;'
          then:
            - logger.log: "RSSI low, Wi-Fi reconnect"
            - wifi.disable:
            - delay: 5s
            - wifi.enable:
