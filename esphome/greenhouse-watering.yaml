  - platform: template
    name: "Теплица — средняя влажность почвы"
    id: soil_moisture_avg
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: moisture
    state_class: measurement
    lambda: |-
      float sum = 0.0f;
      int count = 0;
      if (id(soil_l_near).has_state()) { sum += id(soil_l_near).state; count++; }
      if (id(soil_l_mid).has_state()) { sum += id(soil_l_mid).state; count++; }
      if (id(soil_l_far).has_state()) { sum += id(soil_l_far).state; count++; }
      if (id(soil_r_near).has_state()) { sum += id(soil_r_near).state; count++; }
      if (id(soil_r_mid).has_state()) { sum += id(soil_r_mid).state; count++; }
      if (id(soil_r_far).has_state()) { sum += id(soil_r_far).state; count++; }
      if (count == 0) {
        return NAN;
      }
      return sum / count;
    update_interval: 60s

  - platform: template
    name: "Теплица — минимальная влажность почвы"
    id: soil_moisture_min
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: moisture
    state_class: measurement
    lambda: |-
      bool have = false;
      float min_val = 100.0f;
      if (id(soil_l_near).has_state()) {
        min_val = id(soil_l_near).state;
        have = true;
      }
      if (id(soil_l_mid).has_state()) {
        min_val = have ? std::min(min_val, id(soil_l_mid).state) : id(soil_l_mid).state;
        have = true;
      }
      if (id(soil_l_far).has_state()) {
        min_val = have ? std::min(min_val, id(soil_l_far).state) : id(soil_l_far).state;
        have = true;
      }
      if (id(soil_r_near).has_state()) {
        min_val = have ? std::min(min_val, id(soil_r_near).state) : id(soil_r_near).state;
        have = true;
      }
      if (id(soil_r_mid).has_state()) {
        min_val = have ? std::min(min_val, id(soil_r_mid).state) : id(soil_r_mid).state;
        have = true;
      }
      if (id(soil_r_far).has_state()) {
        min_val = have ? std::min(min_val, id(soil_r_far).state) : id(soil_r_far).state;
        have = true;
      }
      if (!have) {
        return NAN;
      }
      return min_val;
    update_interval: 60s

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO16
      mode: INPUT_PULLUP
      inverted: true
    name: "Бак — верхний уровень"
    id: tank_level_upper
    device_class: moisture
    filters:
      - delayed_on: 2s
      - delayed_off: 5s
    on_press:
      - lambda: |-
          if (!id(fill_calibration_window_active) || !id(fill_total_pulses).has_state()) {
            return;
          }
          const float pulses = id(fill_total_pulses).state - id(fill_middle_level_pulses);
          const float known_volume = id(fill_level_gap_volume).state;
          if (pulses < 10.0f || known_volume <= 0.0f) {
            id(fill_calibration_window_active) = false;
            return;
          }
          const float calibrated_multiplier = known_volume / pulses;
          if (calibrated_multiplier < 0.0005f || calibrated_multiplier > 0.01f) {
            id(fill_calibration_window_active) = false;
            return;
          }
          auto call = id(fill_flow_multiplier).make_call();
          call.set_value(calibrated_multiplier);
          call.perform();
          id(fill_last_calibration_pulses) = pulses;
          id(fill_calibration_window_active) = false;
      - switch.turn_off: valve_tank_fill

  - platform: gpio
    pin:
      number: GPIO17
      mode: INPUT_PULLUP
      inverted: true
    name: "Бак — средний уровень"
    id: tank_level_middle
    device_class: moisture
    filters:
      - delayed_on: 2s
      - delayed_off: 5s
    on_press:
      - lambda: |-
          if (id(valve_tank_fill).state && id(fill_total_pulses).has_state()) {
            id(fill_middle_level_pulses) = id(fill_total_pulses).state;
            id(fill_calibration_window_active) = true;
          }

  - platform: template
    name: "Полив — нет потока"
    id: irrigation_no_flow
    device_class: problem
    lambda: |-
      return id(irrigation_no_flow_fault);

  - platform: template
    name: "Бак — нет потока наполнения"
    id: fill_no_flow
    device_class: problem
    lambda: |-
      return id(fill_no_flow_fault);

  - platform: template
    name: "Полив — поток при закрытом клапане"
    id: irrigation_post_close_flow
    device_class: problem
    lambda: |-
      return id(irrigation_post_close_fault);

  - platform: template
    name: "Бак — поток при закрытом клапане"
    id: fill_post_close_flow
    device_class: problem
    lambda: |-
      return id(fill_post_close_fault);

  - platform: template
    name: "Полив — цель достигнута"
    id: irrigation_target_reached
    lambda: |-
      if (!id(valve_irrigation).state) {
        return false;
      }
      return id(irrigation_cycle_volume).state >= id(irrigation_target_volume).state;

number:
  - platform: template
    name: "Полив — целевой объём"
    id: irrigation_target_volume
    optimistic: true
    restore_value: true
    initial_value: 5
    min_value: 0.1
    max_value: 100
    step: 0.5
    unit_of_measurement: "L"
    mode: box

  - platform: template
    name: "Бак — объём между уровнями"
    id: fill_level_gap_volume
    optimistic: true
    restore_value: true
    initial_value: 10
    min_value: 0.5
    max_value: 200
    step: 0.1
    unit_of_measurement: "L"
    mode: box

  - platform: template
    name: "Бак — коэффициент расходомера наполнения"
    id: fill_flow_multiplier
    optimistic: true
    restore_value: true
    initial_value: ${flow_multiplier}
    min_value: 0.0005
    max_value: 0.01
    step: 0.00001
    mode: box

  # Per-probe soil calibration (V at 0% / 100%). HA script greenhouse_soil_moisture_calibrate writes these.
  - platform: template
    name: "Почва L у входа — калиб. сухо"
    id: soil_l_near_cal_dry
    object_id: pochva_l_u_vkhoda_kalib_sukho
    optimistic: true
    restore_value: true
    initial_value: ${soil_cal_dry_v}
    min_value: 0.0
    max_value: 5.0
    step: 0.001
    unit_of_measurement: "V"
