# Reference table for plant profiles — NOT loaded by Home Assistant directly.
# Source of truth for defaults in automation greenhouse_apply_plant_profile.
# See docs/01-overview.md §4.6 for climate rationale (средняя полоса России).
#
# Irrigation: no soil moisture sensor in current hardware; automations use
# sensor.teplitsa_srednyaya_vlazhnost (SHT31 triangulation average) as a proxy
# for «степень полива почвы». When a soil sensor is added, switch irrigation
# logic to greenhouse_soil_moisture_min and entity sensor.greenhouse_*_vlazhnost_pochvy.
#
# Base values target peak season (June–August) in an unheated hobby greenhouse
# in central Russia (Moscow / Vladimir / Yaroslavl belt). Shoulder-season tweaks
# are manual — see plant_profiles.yaml seasonal_notes and docs/01-overview.md §4.6.

profiles:
  cucumbers:
    label: "Огурцы"
    # Peak-season base; May: raise humidity_min +5–8 %, reduce volume ~30 %
    irrigation_humidity_min: 68   # % RH — irrigate when avg air RH drops below
    irrigation_volume: 6            # L per cycle (Jul heat: up to 8 L)
    # Greenhouse adds ~8–15 °C vs outdoor on sunny days; vent before 35 °C stress
    vent_temp_open: 26              # °C max zone temp — partial vent (40%)
    vent_temp_full: 30              # °C — full vent (100%)
    vent_humidity_max: 82           # % avg RH — vent for condensation (autumn)
    soil_moisture_min: 60           # placeholder only
    min_night_temp_alert: 14        # °C — doc reference only (no automation yet)
  tomatoes:
    label: "Помидоры"
    irrigation_humidity_min: 58
    irrigation_volume: 4.5
    # Vent earlier: fungal risk on humid cool nights (May, Sept) in continental climate
    vent_temp_open: 24
    vent_temp_full: 28
    vent_humidity_max: 70           # lower — vent earlier to reduce fungal risk
    soil_moisture_min: 55
    min_night_temp_alert: 12        # °C — doc reference only

# Manual seasonal adjustments (re-apply profile after season, or tweak input_number on dashboard):
seasonal_notes:
  may:
    summary: "Медленный прогрев, заморозки, сухой воздух; почва холодная"
    cucumbers:
      irrigation_humidity_min: "+5…+8 % (реже полив)"
      irrigation_volume: "4–5 L"
      vent: "базовые уставки; ночью форточки закрыты автоматически"
    tomatoes:
      irrigation_humidity_min: "+5…+8 %"
      irrigation_volume: "3–4 L"
      vent_humidity_max: "−3…−5 % (ниже порог RH — раньше проветривание от конденсата)"
  june:
    summary: "Стабилизация тепла; первая волна жары"
    cucumbers:
      irrigation_volume: "базовый → +1 L при жаре >28 °C в теплице"
    tomatoes:
      vent_humidity_max: "базовый; следить за влажными прохладными ночами"
  july:
    summary: "Пик сезона; жара 30–35 °C+ в теплице без проветривания"
    cucumbers:
      irrigation_volume: "7–8 L"
      irrigation_humidity_min: "базовый или −2 % при стабильной жаре"
    tomatoes:
      irrigation_volume: "5–6 L"
      vent_temp_open: "базовый (24 °C) — не повышать"
  august:
    summary: "Жара + грозовые скачки RH"
    both:
      vent_humidity_max: "базовый; после грозы проверить проветривание"
    cucumbers:
      irrigation_volume: "базовый"
  september:
    summary: "Похолодание, конденсат, меньше света"
    cucumbers:
      irrigation_humidity_min: "+3…+5 %"
      irrigation_volume: "4–5 L"
    tomatoes:
      irrigation_humidity_min: "+3…+5 %"
      irrigation_volume: "3–4 L"
      vent_humidity_max: "−3…−5 % от базового"
