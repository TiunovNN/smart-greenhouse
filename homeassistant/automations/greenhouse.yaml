# Entity IDs follow ESPHome friendly names (Russian → slug).
#
# Seasonal operation (central Russia): IP65 cabinet mounted and powered ~May–Sep only.
# Winter (~Oct–Apr): cabinet removed/stored indoors; ESP32 offline → entities unavailable;
# automations below do not actuate hardware until remount. Manual taps/valves on site if needed.
# Optional: add input_boolean.greenhouse_season_active + condition: state "on" on each automation.
# See docs/03-greenhouse-installation.md §0.1, docs/01-overview.md §5.4.
#
# Climate triangulation (after flash — verify in Settings → Devices):
#   sensor.teplitsa_vkhod_niz_temperatura / _vlazhnost          — zone 1, entrance bottom
#   sensor.teplitsa_protivopolozhnaya_storona_temperatura / _vlazhnost — zone 2, opposite side
#   sensor.teplitsa_tsentr_naverkhu_temperatura / _vlazhnost     — zone 3, center top
#   sensor.teplitsa_srednyaya_temperatura / teplitsa_srednyaya_vlazhnost — averages
#   sensor.teplitsa_max_temperatura / teplitsa_min_temperatura / teplitsa_razbros_temperatury
#   sensor.teplitsa_max_vlazhnost / teplitsa_min_vlazhnost / teplitsa_razbros_vlazhnosti
#   text_sensor.teplitsa_zona_max_temperatury / teplitsa_zona_min_temperatury — hot/cold spot labels
# Ventilation uses max temp (any zone overheating) and avg humidity (upper-band / stagnation).
# Greenhouse interior RH is typically 70–95%; vent_humidity_max is not "low RH" semantics.
# Climate vent limit switches (after flash — verify in Settings → Devices):
#   binary_sensor.greenhouse_climate_fortochka_1_zakryta_kontsevik
#   binary_sensor.greenhouse_climate_fortochka_1_otkryta_kontsevik
#   binary_sensor.greenhouse_climate_fortochka_2_zakryta_kontsevik
#   binary_sensor.greenhouse_climate_fortochka_2_otkryta_kontsevik
#   binary_sensor.greenhouse_climate_fortochka_1_oshibka_polozheniya
#   binary_sensor.greenhouse_climate_fortochka_2_oshibka_polozheniya
#
# New watering entities (after flash):
#   sensor.greenhouse_watering_poliv_obem_za_tsikl
#   sensor.greenhouse_watering_bak_obem_napolneniya_za_tsikl
#   binary_sensor.greenhouse_watering_poliv_net_potoka
#   binary_sensor.greenhouse_watering_bak_net_potoka_napolneniya
#   binary_sensor.greenhouse_watering_poliv_potok_pri_zakrytom_klapane
#   binary_sensor.greenhouse_watering_bak_potok_pri_zakrytom_klapane
#   binary_sensor.greenhouse_watering_poliv_tsel_dostignuta
#   number.greenhouse_watering_poliv_tselevoy_obem
#
# Helpers: input_select.greenhouse_plant_profile, input_number.* (input_select.yaml, input_number.yaml)
# Profile defaults: homeassistant/plant_profiles.yaml — applied by greenhouse_apply_plant_profile
# Prefer number.greenhouse_watering_poliv_tselevoy_obem on device; input_number is a dashboard fallback.
# Irrigation uses avg air RH (SHT31) as relative soil-moisture proxy — GH baseline 70–95%, not room air.

- id: greenhouse_apply_plant_profile
  alias: "Теплица — применить профиль культуры"
  description: >-
    Загрузить уставки полива и проветривания из профиля (огурцы / помидоры).
    Ручные правки input_number сохраняются до следующей смены профиля или перезапуска HA.
  mode: restart
  triggers:
    - trigger: state
      entity_id: input_select.greenhouse_plant_profile
    - trigger: homeassistant
      event: start
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.greenhouse_plant_profile
              state: "Огурцы"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.greenhouse_irrigation_humidity_min
              data:
                value: 68
            - action: input_number.set_value
              target:
                entity_id: input_number.greenhouse_irrigation_volume
              data:
                value: 6
            - action: input_number.set_value
              target:
                entity_id: input_number.greenhouse_vent_temp_open
              data:
                value: 26
            - action: input_number.set_value
              target:
                entity_id: input_number.greenhouse_vent_temp_full
              data:
                value: 30
            - action: input_number.set_value
              target:
                entity_id: input_number.greenhouse_vent_humidity_max
              data:
                value: 82
            - action: input_number.set_value
              target:
                entity_id: input_number.greenhouse_soil_moisture_min
              data:
                value: 60
        - conditions:
            - condition: state
              entity_id: input_select.greenhouse_plant_profile
              state: "Помидоры"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.greenhouse_irrigation_humidity_min
              data:
                value: 58
            - action: input_number.set_value
              target:
                entity_id: input_number.greenhouse_irrigation_volume
              data:
                value: 4.5
            - action: input_number.set_value
              target:
                entity_id: input_number.greenhouse_vent_temp_open
              data:
                value: 24
            - action: input_number.set_value
              target:
                entity_id: input_number.greenhouse_vent_temp_full
              data:
                value: 28
            - action: input_number.set_value
              target:
                entity_id: input_number.greenhouse_vent_humidity_max
              data:
                value: 70
            - action: input_number.set_value
              target:
                entity_id: input_number.greenhouse_soil_moisture_min
              data:
                value: 55

- id: greenhouse_irrigation_by_humidity
  alias: "Теплица — полив по влажности"
  description: >-
    Полив до целевого объёма если средняя RH воздуха ниже уставки профиля
    (прокси влажности почвы) и светло
  mode: single
  triggers:
    - trigger: time
      at: "07:00:00"
  conditions:
    - condition: template
      value_template: >-
        {{ states('sensor.teplitsa_srednyaya_vlazhnost') | float(100) <
           states('input_number.greenhouse_irrigation_humidity_min') | float(55) }}
    - condition: numeric_state
      entity_id: sensor.osveshchennost_potolok
      above: 500
  actions:
    - action: number.set_value
      target:
        entity_id: number.greenhouse_watering_poliv_tselevoy_obem
      data:
        value: "{{ states('input_number.greenhouse_irrigation_volume') | float(5) }}"
    - action: switch.turn_on
      target:
        entity_id: switch.greenhouse_watering_klapan_poliva
    - wait_for_trigger:
        - trigger: state
          entity_id: binary_sensor.greenhouse_watering_poliv_tsel_dostignuta
          to: "on"
          for: "00:00:02"
        - trigger: state
          entity_id: switch.greenhouse_watering_klapan_poliva
          to: "off"
      timeout: "00:15:00"
      continue_on_timeout: true
    - if:
        - condition: state
          entity_id: binary_sensor.greenhouse_watering_poliv_tsel_dostignuta
          state: "on"
        - condition: state
          entity_id: binary_sensor.greenhouse_watering_poliv_net_potoka
          state: "off"
      then:
        - action: notify.persistent_notification
          data:
            title: "Теплица — полив завершён"
            message: >-
              Долито {{ states('sensor.greenhouse_watering_poliv_obem_za_tsikl') | float(0) | round(2) }} л
              (цель {{ states('number.greenhouse_watering_poliv_tselevoy_obem') | float(5) | round(2) }} л).
      else:
        - if:
            - condition: state
              entity_id: binary_sensor.greenhouse_watering_poliv_net_potoka
              state: "off"
          then:
            - action: notify.persistent_notification
              data:
                title: "Теплица — полив не завершён"
                message: >-
                  Цель не достигнута за 15 мин. Долито
                  {{ states('sensor.greenhouse_watering_poliv_obem_za_tsikl') | float(0) | round(2) }} л
                  из {{ states('number.greenhouse_watering_poliv_tselevoy_obem') | float(5) | round(2) }} л.
    - action: switch.turn_off
      target:
        entity_id: switch.greenhouse_watering_klapan_poliva
      continue_on_error: true

- id: greenhouse_tank_fill
  alias: "Теплица — наполнение бака"
  description: "Наполнение до поплавка с контролем потока на линии наполнения"
  mode: single
  triggers:
    - trigger: state
      entity_id: binary_sensor.greenhouse_watering_bak_vysokiy_uroven
      from: "on"
      to: "off"
      for: "00:01:00"
  conditions:
    - condition: state
      entity_id: binary_sensor.greenhouse_watering_bak_vysokiy_uroven
      state: "off"
  actions:
    - action: switch.turn_on
      target:
        entity_id: switch.greenhouse_watering_klapan_napolneniya_baka
    - wait_for_trigger:
        - trigger: state
          entity_id: binary_sensor.greenhouse_watering_bak_vysokiy_uroven
          to: "on"
        - trigger: state
          entity_id: switch.greenhouse_watering_klapan_napolneniya_baka
          to: "off"
      timeout: "00:10:00"
      continue_on_timeout: true
    - if:
        - condition: state
          entity_id: binary_sensor.greenhouse_watering_bak_vysokiy_uroven
          state: "on"
        - condition: state
          entity_id: binary_sensor.greenhouse_watering_bak_net_potoka_napolneniya
          state: "off"
      then:
        - action: notify.persistent_notification
          data:
            title: "Теплица — бак наполнен"
            message: >-
              Залито {{ states('sensor.greenhouse_watering_bak_obem_napolneniya_za_tsikl') | float(0) | round(2) }} л за цикл.
      else:
        - if:
            - condition: state
              entity_id: binary_sensor.greenhouse_watering_bak_net_potoka_napolneniya
              state: "off"
          then:
            - action: notify.persistent_notification
              data:
                title: "Теплица — наполнение не завершено"
                message: >-
                  Поплавок не сработал за 10 мин. Залито
                  {{ states('sensor.greenhouse_watering_bak_obem_napolneniya_za_tsikl') | float(0) | round(2) }} л.
    - action: switch.turn_off
      target:
        entity_id: switch.greenhouse_watering_klapan_napolneniya_baka
      continue_on_error: true

- id: greenhouse_tank_overflow_protection
  alias: "Теплица — защита переполнения бака"
  description: "Закрыть клапан наполнения при срабатывании поплавка высокого уровня"
  mode: restart
  triggers:
    - trigger: state
      entity_id: binary_sensor.greenhouse_watering_bak_vysokiy_uroven
      to: "on"
      for: "00:00:05"
  actions:
    - action: switch.turn_off
      target:
        entity_id: switch.greenhouse_watering_klapan_napolneniya_baka
    - action: notify.persistent_notification
      data:
        title: "Теплица — переполнение бака"
        message: "Клапан наполнения принудительно закрыт."

- id: greenhouse_watering_no_flow_alert
  alias: "Теплица — авария нет потока (ручной полив/наполнение)"
  description: "Уведомление при ручном включении клапана без потока"
  mode: parallel
  max: 2
  triggers:
    - trigger: state
      entity_id: binary_sensor.greenhouse_watering_poliv_net_potoka
      to: "on"
      id: irrigation_no_flow
    - trigger: state
      entity_id: binary_sensor.greenhouse_watering_bak_net_potoka_napolneniya
      to: "on"
      id: fill_no_flow
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: irrigation_no_flow
          sequence:
            - action: notify.persistent_notification
              data:
                title: "Теплица — нет потока на линии полива"
                message: "Клапан полива открыт без потока. Клапан будет закрыт."
            - action: switch.turn_off
              target:
                entity_id: switch.greenhouse_watering_klapan_poliva
        - conditions:
            - condition: trigger
              id: fill_no_flow
          sequence:
            - action: notify.persistent_notification
              data:
                title: "Теплица — нет потока при наполнении"
                message: "Клапан наполнения открыт без потока. Клапан будет закрыт."
            - action: switch.turn_off
              target:
                entity_id: switch.greenhouse_watering_klapan_napolneniya_baka

- id: greenhouse_watering_post_close_flow_alert
  alias: "Теплица — поток при закрытом клапане"
  description: >-
    Уведомление при неожиданном потоке на закрытой линии: после закрытия клапана,
    в простое (оба клапана закрыты) или при утечке/открытом вручную кране
  mode: parallel
  max: 2
  triggers:
    - trigger: state
      entity_id: binary_sensor.greenhouse_watering_poliv_potok_pri_zakrytom_klapane
      to: "on"
      id: irrigation_post_close
    - trigger: state
      entity_id: binary_sensor.greenhouse_watering_bak_potok_pri_zakrytom_klapane
      to: "on"
      id: fill_post_close
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: irrigation_post_close
          sequence:
            - action: notify.persistent_notification
              data:
                title: "Теплица — поток при закрытом клапане полива"
                message: >-
                  Клапан полива закрыт, но расходомер показывает поток
                  ({{ states('sensor.greenhouse_watering_poliv_rashod') | float(0) | round(2) }} л/мин).
                  Возможны утечка, открытый вручную кран, залипший клапан или неисправность датчика.
        - conditions:
            - condition: trigger
              id: fill_post_close
          sequence:
            - action: notify.persistent_notification
              data:
                title: "Теплица — поток при закрытом клапане наполнения"
                message: >-
                  Клапан наполнения закрыт, но расходомер показывает поток
                  ({{ states('sensor.greenhouse_watering_bak_rashod_napolneniya') | float(0) | round(2) }} л/мин).
                  Возможны утечка, открытый вручную кран, залипший клапан или неисправность датчика.

- id: greenhouse_ventilation
  alias: "Теплица — проветривание"
  description: >-
    Открыть форточки при max T выше уставки профиля (5 мин) или средней RH выше
    уставки (10 мин). Полное открытие при max T выше greenhouse_vent_temp_full.
  mode: single
  triggers:
    - trigger: template
      value_template: >-
        {{ states('sensor.teplitsa_max_temperatura') | float(0) >
           states('input_number.greenhouse_vent_temp_open') | float(28) }}
      for: "00:05:00"
      id: high_temp
    - trigger: template
      value_template: >-
        {{ states('sensor.teplitsa_srednyaya_vlazhnost') | float(0) >
           states('input_number.greenhouse_vent_humidity_max') | float(85) }}
      for: "00:10:00"
      id: high_humidity
  conditions:
    - condition: or
      conditions:
        - condition: template
          value_template: >-
            {{ states('sensor.teplitsa_max_temperatura') | float(0) >
               states('input_number.greenhouse_vent_temp_open') | float(28) }}
        - condition: template
          value_template: >-
            {{ states('sensor.teplitsa_srednyaya_vlazhnost') | float(0) >
               states('input_number.greenhouse_vent_humidity_max') | float(85) }}
  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: >-
                {{ states('sensor.teplitsa_max_temperatura') | float(0) >
                   states('input_number.greenhouse_vent_temp_full') | float(32) }}
          sequence:
            - action: cover.set_cover_position
              target:
                entity_id: cover.fortochka_1
              data:
                position: 100
            - action: cover.set_cover_position
              target:
                entity_id: cover.fortochka_2
              data:
                position: 100
      default:
        - action: cover.set_cover_position
          target:
            entity_id:
              - cover.fortochka_1
              - cover.fortochka_2
          data:
            position: 40

- id: greenhouse_close_vents_at_night
  alias: "Теплица — закрыть форточки на ночь"
  mode: single
  triggers:
    - trigger: sun
      event: sunset
      offset: "00:30:00"
      id: after_sunset
    - trigger: numeric_state
      entity_id: sensor.osveshchennost_potolok
      below: 10
      for: "00:15:00"
      id: low_lux
  actions:
    - action: cover.close_cover
      target:
        entity_id:
          - cover.fortochka_1
          - cover.fortochka_2

- id: greenhouse_vent_position_fault_alert
  alias: "Теплица — ошибка положения форточки"
  description: >-
    Уведомление если концевик не подтвердил движение или положение не совпадает
    с командой (заклинило, сорван привод, неисправен концевик)
  mode: parallel
  max: 2
  triggers:
    - trigger: state
      entity_id: binary_sensor.greenhouse_climate_fortochka_1_oshibka_polozheniya
      to: "on"
      id: vent_1_fault
    - trigger: state
      entity_id: binary_sensor.greenhouse_climate_fortochka_2_oshibka_polozheniya
      to: "on"
      id: vent_2_fault
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: vent_1_fault
          sequence:
            - action: notify.persistent_notification
              data:
                title: "Теплица — форточка 1: ошибка положения"
                message: >-
                  Концевики не подтверждают положение окна
                  (закрыта: {{ states('binary_sensor.greenhouse_climate_fortochka_1_zakryta_kontsevik') }},
                  открыта: {{ states('binary_sensor.greenhouse_climate_fortochka_1_otkryta_kontsevik') }},
                  угол: {{ states('number.okno_1_ugol') | float(0) | round(0) }}°).
                  Проверьте привод, механику и монтаж концевиков.
        - conditions:
            - condition: trigger
              id: vent_2_fault
          sequence:
            - action: notify.persistent_notification
              data:
                title: "Теплица — форточка 2: ошибка положения"
                message: >-
                  Концевики не подтверждают положение окна
                  (закрыта: {{ states('binary_sensor.greenhouse_climate_fortochka_2_zakryta_kontsevik') }},
                  открыта: {{ states('binary_sensor.greenhouse_climate_fortochka_2_otkryta_kontsevik') }},
                  угол: {{ states('number.okno_2_ugol') | float(0) | round(0) }}°).
                  Проверьте привод, механику и монтаж концевиков.
