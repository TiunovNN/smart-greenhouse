# Generated by aurora@aurora-smart-home (home-assistant skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Include in configuration.yaml:
#   script: !include_dir_merge_named scripts/
#
# Guided dry/wet capture for one capacitive soil probe at a time.
# Writes per-probe V setpoints on greenhouse-watering ESP32 (restore_value numbers).
# Entity IDs below match ESPHome friendly names — verify after flash in Settings → Devices.

greenhouse_soil_moisture_calibrate:
  alias: "Теплица — калибровка зонда почвы"
  description: >-
    Пошаговая калибровка выбранного зонда: сухая опора → замер → влажная опора → замер.
    Сохраняет напряжения на ESP32; влажность % обновляется сразу.
  mode: restart
  sequence:
    - variables:
        probe: "{{ states('input_select.greenhouse_soil_cal_probe') }}"
        probe_map:
          "L у входа":
            voltage: sensor.greenhouse_watering_pochva_l_u_vkhoda_napryazhenie
            dry: number.greenhouse_watering_pochva_l_u_vkhoda_kalib_sukho
            wet: number.greenhouse_watering_pochva_l_u_vkhoda_kalib_mokro
            moisture: sensor.greenhouse_watering_pochva_l_u_vkhoda_vlazhnost
          "L середина":
            voltage: sensor.greenhouse_watering_pochva_l_seredina_napryazhenie
            dry: number.greenhouse_watering_pochva_l_seredina_kalib_sukho
            wet: number.greenhouse_watering_pochva_l_seredina_kalib_mokro
            moisture: sensor.greenhouse_watering_pochva_l_seredina_vlazhnost
          "L излом П":
            voltage: sensor.greenhouse_watering_pochva_l_izlom_p_napryazhenie
            dry: number.greenhouse_watering_pochva_l_izlom_p_kalib_sukho
            wet: number.greenhouse_watering_pochva_l_izlom_p_kalib_mokro
            moisture: sensor.greenhouse_watering_pochva_l_izlom_p_vlazhnost
          "R у входа":
            voltage: sensor.greenhouse_watering_pochva_r_u_vkhoda_napryazhenie
            dry: number.greenhouse_watering_pochva_r_u_vkhoda_kalib_sukho
            wet: number.greenhouse_watering_pochva_r_u_vkhoda_kalib_mokro
            moisture: sensor.greenhouse_watering_pochva_r_u_vkhoda_vlazhnost
          "R середина":
            voltage: sensor.greenhouse_watering_pochva_r_seredina_napryazhenie
            dry: number.greenhouse_watering_pochva_r_seredina_kalib_sukho
            wet: number.greenhouse_watering_pochva_r_seredina_kalib_mokro
            moisture: sensor.greenhouse_watering_pochva_r_seredina_vlazhnost
          "R излом П":
            voltage: sensor.greenhouse_watering_pochva_r_izlom_p_napryazhenie
            dry: number.greenhouse_watering_pochva_r_izlom_p_kalib_sukho
            wet: number.greenhouse_watering_pochva_r_izlom_p_kalib_mokro
            moisture: sensor.greenhouse_watering_pochva_r_izlom_p_vlazhnost
        v_entity: "{{ probe_map.get(probe, {}).get('voltage') }}"
        dry_entity: "{{ probe_map.get(probe, {}).get('dry') }}"
        wet_entity: "{{ probe_map.get(probe, {}).get('wet') }}"
        moisture_entity: "{{ probe_map.get(probe, {}).get('moisture') }}"
    - if:
        - condition: template
          value_template: >-
            {{ v_entity is none or dry_entity is none or wet_entity is none }}
      then:
        - action: notify.persistent_notification
          data:
            title: "Теплица — калибровка почвы"
            message: "Неизвестный зонд «{{ probe }}». Выберите зонд в списке и повторите."
        - stop: "Unknown probe"
    - if:
        - condition: template
          value_template: >-
            {{ states(v_entity) in ['unknown', 'unavailable', none, ''] }}
      then:
        - action: notify.persistent_notification
          data:
            title: "Теплица — калибровка почвы"
            message: >-
              Зонд «{{ probe }}» недоступен ({{ v_entity }}).
              Проверьте питание щита и ESP32 greenhouse-watering.
        - stop: "Probe unavailable"
    - action: notify.persistent_notification
      data:
        title: "Теплица — калибровка почвы (1/2)"
        message: >-
          Зонд: {{ probe }}.
          Вставьте только этот зонд в сухую опорную почву (воздушно-сухой субстрат или сухой песок).
          Подождите ~30 с для стабилизации, затем нажмите «Теплица — зонд в сухой почве (подтвердить)».
    - wait_for_trigger:
        - trigger: state
          entity_id: input_button.greenhouse_soil_cal_confirm_dry
      timeout: "00:30:00"
      continue_on_timeout: true
    - if:
        - condition: template
          value_template: "{{ wait.trigger is none }}"
      then:
        - action: notify.persistent_notification
          data:
            title: "Теплица — калибровка почвы"
            message: "Таймаут шага «сухо» для зонда {{ probe }}. Калибровка отменена."
        - stop: "Dry step timeout"
    - delay: "00:00:03"
    - variables:
        dry_v: "{{ states(v_entity) | float(none) }}"
    - if:
        - condition: template
          value_template: "{{ dry_v is none }}"
      then:
        - action: notify.persistent_notification
          data:
            title: "Теплица — калибровка почвы"
            message: >-
              Не удалось прочитать напряжение с {{ v_entity }} (сухой шаг).
              Проверьте подключение зонда и повторите.
        - stop: "Dry read failed"
    - action: notify.persistent_notification
      data:
        title: "Теплица — калибровка почвы (2/2)"
        message: >-
          Сухое напряжение: {{ dry_v | round(3) }} V.
          Перенесите тот же зонд во влажную опору (насыщенный влажный субстрат или вода у корня).
          Подождите ~30 с, затем нажмите «Теплица — зонд во влажной почве (подтвердить)».
    - wait_for_trigger:
        - trigger: state
          entity_id: input_button.greenhouse_soil_cal_confirm_wet
      timeout: "00:30:00"
      continue_on_timeout: true
    - if:
        - condition: template
          value_template: "{{ wait.trigger is none }}"
      then:
        - action: notify.persistent_notification
          data:
            title: "Теплица — калибровка почвы"
            message: "Таймаут шага «мокро» для зонда {{ probe }}. Сухое значение не сохранено."
        - stop: "Wet step timeout"
    - delay: "00:00:03"
    - variables:
        wet_v: "{{ states(v_entity) | float(none) }}"
    - if:
        - condition: template
          value_template: "{{ wet_v is none }}"
      then:
        - action: notify.persistent_notification
          data:
            title: "Теплица — калибровка почвы"
            message: >-
              Не удалось прочитать напряжение с {{ v_entity }} (мокрый шаг).
              Калибровка отменена, прежние значения на ESP32 не изменены.
        - stop: "Wet read failed"
    - if:
        - condition: template
          value_template: "{{ (wet_v - dry_v) | float(0) < 0.05 }}"
      then:
        - action: notify.persistent_notification
          data:
            title: "Теплица — калибровка почвы"
            message: >-
              Разница мокро/сухо слишком мала (сухо {{ dry_v | round(3) }} V,
              мокро {{ wet_v | round(3) }} V). Проверьте опоры и повторите.
        - stop: "Insufficient span"
    - action: number.set_value
      target:
        entity_id: "{{ dry_entity }}"
      data:
        value: "{{ dry_v | round(3) }}"
    - action: number.set_value
      target:
        entity_id: "{{ wet_entity }}"
      data:
        value: "{{ wet_v | round(3) }}"
    - delay: "00:00:05"
    - action: notify.persistent_notification
      data:
        title: "Теплица — калибровка почвы завершена"
        message: >-
          Зонд {{ probe }}: сухо {{ dry_v | round(3) }} V → 0 %,
          мокро {{ wet_v | round(3) }} V → 100 %.
          Текущая влажность: {{ states(moisture_entity) | float(0) | round(0) }} %.
          Значения сохранены на ESP32 ({{ dry_entity }}, {{ wet_entity }}).
          Повторите для остальных зондов при необходимости.
